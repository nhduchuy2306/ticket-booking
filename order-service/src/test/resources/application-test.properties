spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:order_service;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret.token=test-secret-key-test-secret-key-test-secret-key

momo.partner-code=test-partner-code
momo.access-key=test-access-key
momo.secret-key=test-secret-key
momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.return-url=http://localhost:9999/orders/payments/paymentinfo
momo.notify-url=http://localhost:9999/orders/payments/paymentnotify
momo.frontend-success-url=http://localhost:3000/gyp/payment/success
momo.frontend-failure-url=http://localhost:3000/gyp/payment/failure

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=12345
spring.data.redis.database=0

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.discovery.enabled=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false