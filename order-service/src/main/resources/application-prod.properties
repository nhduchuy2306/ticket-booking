# ===============================
# Server Configuration
# ===============================
server.port=9003
spring.application.name=order-service

# ===============================
# AOP
# ===============================
spring.aop.proxy-target-class=true

# ===============================
# JWT Configuration
# ===============================
jwt.secret.token=kZvFECgzEsX5bhcOY/SUJo9JGp1quQNeKeinebiXO9ImHNfIROwa7+QnqhSLOa6K

# ===============================
# Database Configuration
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql:3306/order_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

# ===============================
# Flyway Migration
# ===============================
spring.flyway.enabled=true
spring.flyway.url=jdbc:mysql://mysql:3306/order_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.flyway.user=root
spring.flyway.password=12345
spring.flyway.baseline-on-migrate=true

# ===============================
# Kafka Configuration
# ===============================
spring.kafka.bootstrap-servers=localhost:9092

# Producer settings
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer settings
spring.kafka.consumer.group-id=event-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ===============================
# Eureka Discovery
# ===============================;
eureka.client.service-url.defaultZone=http://discovery-service:9761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=discovery-service
eureka.instance.instance-id=${spring.application.name}:${server.port}

