<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Email Template</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #e8e8e8;
            font-family: 'Roboto', sans-serif;
            color: #222;
        }

        p {
            line-height: 28px;
        }

        .container {
            width: 600px;
            margin: 20px auto auto;
            background-color: #fff;
            padding: 20px;
        }

        header h1 {
            text-align: center;
            margin-bottom: 16px;
        }

        section span {
            font-weight: bold;
        }

        footer {
            margin-top: 20px;
        }

        .qr-code-container {
            text-align: center;
            margin: 20px 0;
        }

        .qr-code {
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Notification</h1>
    </header>
    <section>
        <p>Hello <span th:text="${name}"></span>,</p>
        <p>Thank you for using our product, this is your ticket:</p>
        <p th:utext="${content}"></p>
        <div class="qr-code-container">
            <img class="qr-code" th:src="${qrCode}" alt="QR Code"/>
        </div>
    </section>
    <footer>
        <p>Best Regard,</p>
        <p>GYP</p>
    </footer>
</div>
</body>
</html>
