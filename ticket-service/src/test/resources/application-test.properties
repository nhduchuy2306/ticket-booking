spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:ticket_service;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret.token=test-secret-key-test-secret-key-test-secret-key

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=12345
spring.data.redis.database=0

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=no-reply@gmail.com
spring.mail.password=

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.discovery.enabled=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
minio.url=http://localhost:19000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=ticket-service