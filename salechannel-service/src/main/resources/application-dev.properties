# ===============================
# Server Configuration
# ===============================
server.port=9004
spring.application.name=salechannel-service

# ===============================
# AOP
# ===============================
spring.aop.proxy-target-class=true

# ===============================
# JWT Configuration
# ===============================
jwt.secret.token=${JWT_SECRET_TOKEN}

# ===============================
# Database Configuration
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:13306/salechannel_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

# ===============================
# Flyway Migration
# ===============================
spring.flyway.enabled=true
spring.flyway.url=jdbc:mysql://localhost:13306/salechannel_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.flyway.user=root
spring.flyway.password=12345
spring.flyway.baseline-on-migrate=true

# ===============================
# Kafka Configuration
# ===============================
spring.kafka.bootstrap-servers=localhost:9092

# Producer settings
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer settings
spring.kafka.consumer.group-id=new-sale-channel-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=true

# Add these properties for better error handling
spring.kafka.consumer.properties.request.timeout.ms=30000
spring.kafka.consumer.properties.retry.backoff.ms=1000
spring.kafka.producer.properties.request.timeout.ms=30000

# ===============================
# Eureka Discovery
# ===============================;
eureka.client.service-url.defaultZone=http://localhost:9761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ===============================
# GRPC Server Configuration
# ===============================
spring.grpc.server.port=39004
spring.grpc.server.reflection.enabled=true

# ===============================
# MINIO Configuration
# ===============================
minio.enabled=false