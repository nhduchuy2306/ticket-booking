server.port=8000

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/auth_service?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.flyway.url=jdbc:mysql://localhost:3306/auth_service?useSSL=false&serverTimezone=UTC
spring.flyway.user=root
spring.flyway.password=12345
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true
eureka.client.enabled=false

# Tell it where the Eureka server is
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/