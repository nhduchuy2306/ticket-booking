syntax = "proto3";

package salechannel;

option java_multiple_files = true;
option java_package = "com.gyp.salechannelservice.grpc.salechannel";
option java_outer_classname = "SaleChannelServiceProto";

service SaleChannelService {
  rpc GetSaleChannelByEventId(SaleChannelByEventIdRequest) returns (SaleChannelByEventIdResponseList);
}

message SaleChannelByEventIdRequest {
  string eventId = 1;
}

message SaleChannelByEventIdResponse {
  string id = 1;
  string name = 2;
}

message SaleChannelByEventIdResponseList {
  repeated SaleChannelByEventIdResponse saleChannels = 1;
}