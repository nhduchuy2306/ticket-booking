syntax = "proto3";

package event;

option java_multiple_files = true;
option java_package = "com.gyp.eventservice.grpc.event";
option java_outer_classname = "EventServiceProto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service EventService {
  rpc GetAllEvents(google.protobuf.Empty) returns (EventResponseList);
}

enum EventStatus {
  DRAFT = 0;
  PENDING_APPROVAL = 1;
  PUBLISHED = 2;
  CANCELLED = 3;
  POSTPONED = 4;
  COMPLETED = 5;
}

message EventResponse {
  string id = 1;
  string name = 2;
  string description = 3;
  EventStatus status = 4;
  google.protobuf.Timestamp startTime = 5;
  google.protobuf.Timestamp endTime = 6;
  google.protobuf.Timestamp doorOpenTime = 7;
  google.protobuf.Timestamp doorCloseTime = 8;
  string organizer = 9;
  string venue = 10;
}

message EventResponseList {
  repeated EventResponse events = 1;
}