# ===============================
# Server Configuration
# ===============================
server.port=9001
spring.application.name=event-service

# ===============================
# AOP
# ===============================
spring.aop.proxy-target-class=true

# ===============================
# JWT Configuration
# ===============================
jwt.secret.token=${JWT_SECRET_TOKEN}

# ===============================
# Database Configuration
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://mysql:3306/event_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true

# ===============================
# Flyway Migration
# ===============================
spring.flyway.enabled=true
spring.flyway.url=jdbc:mysql://mysql:3306/event_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.flyway.user=root
spring.flyway.password=12345
spring.flyway.baseline-on-migrate=true

# ===============================
# Kafka Configuration
# ===============================
spring.kafka.bootstrap-servers=kafka:29092

# Producer settings
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer settings
spring.kafka.consumer.group-id=event-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ===============================
# Eureka Discovery
# ===============================;
eureka.client.service-url.defaultZone=http://discovery-service:9761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=discovery-service
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ===============================
# MINIO Configuration
# ===============================
minio.url=http://minio:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=event-service
minio.enable=true