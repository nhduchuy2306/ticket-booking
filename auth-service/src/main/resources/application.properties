# ===============================
# Server Configuration
# ===============================
server.port=9000
spring.cloud.config.enabled=false
spring.application.name=auth-service
spring.config.import=optional:classpath:observability/common-actuator.properties

# ===============================
# AOP
# ===============================
spring.aop.proxy-target-class=true

# ===============================
# JWT Configuration
# ===============================
jwt.secret.token=${JWT_SECRET_TOKEN}

customer.frontend.base-url=${CUSTOMER_FRONTEND_BASE_URL:http://localhost:3000}
customer.frontend.login-url=${CUSTOMER_FRONTEND_LOGIN_URL:${customer.frontend.base-url}/login}
customer.frontend.oauth2-callback-url=${CUSTOMER_FRONTEND_OAUTH2_CALLBACK_URL:${customer.frontend.base-url}/oauth2/callback}

spring.security.oauth2.client.registration.google-customer.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google-customer.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google-customer.scope=openid,email,profile
spring.security.oauth2.client.registration.google-customer.redirect-uri={baseUrl}/api/auth/customer/oauth2/callback/google-customer
spring.security.oauth2.client.registration.google-customer.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google-customer.client-name=Google

spring.security.oauth2.client.provider.google-customer.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google-customer.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google-customer.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google-customer.user-name-attribute=sub
spring.security.oauth2.client.provider.google-customer.issuer-uri=https://accounts.google.com
spring.security.oauth2.client.provider.google-customer.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# ===============================
# Database Configuration
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/auth_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=auth_service

# ===============================
# Flyway Migration
# ===============================
spring.flyway.enabled=true
spring.flyway.url=jdbc:mysql://localhost:3306/auth_service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.flyway.user=root
spring.flyway.password=12345
spring.flyway.baseline-on-migrate=true

# ===============================
# Kafka Configuration
# ===============================
spring.kafka.bootstrap-servers=localhost:9092

# Producer settings
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer settings
spring.kafka.consumer.group-id=auth-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ===============================
# Eureka Discovery
# ===============================
eureka.client.service-url.defaultZone=http://localhost:9761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}

## ===============================
## MinIo Configuration
## ===============================
minio.enabled=false
