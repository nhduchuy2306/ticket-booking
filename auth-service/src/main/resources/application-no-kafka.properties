# ===============================
# Server Configuration
# ===============================
server.port=9000
spring.application.name=auth-service

# ===============================
# AOP
# ===============================
spring.aop.proxy-target-class=true

# ===============================
# JWT Configuration
# ===============================
jwt.secret.token=kZvFECgzEsX5bhcOY/SUJo9JGp1quQNeKeinebiXO9ImHNfIROwa7+QnqhSLOa6K

# ===============================
# Database Configuration
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/auth_service?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=auth_service

# ===============================
# Flyway Migration
# ===============================
spring.flyway.enabled=true
spring.flyway.url=jdbc:mysql://localhost:3306/auth_service?useSSL=false&serverTimezone=UTC
spring.flyway.user=root
spring.flyway.password=12345
spring.flyway.baseline-on-migrate=true

# ===============================
# Kafka Disable
# ===============================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# ===============================
# Eureka Discovery
# ===============================
eureka.client.service-url.defaultZone=http://localhost:9761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ===============================
# Logging Configuration
# ===============================
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web=DEBUG