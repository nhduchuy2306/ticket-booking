<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Login</title>
  <style>
      body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          margin: 0;
          padding: 0;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
      }

      .login-container {
          background: white;
          padding: 2rem;
          border-radius: 10px;
          box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
          width: 100%;
          max-width: 400px;
      }

      .login-header {
          text-align: center;
          margin-bottom: 2rem;
      }

      .login-header h1 {
          color: #333;
          margin-bottom: 0.5rem;
      }

      .login-header p {
          color: #666;
          margin: 0;
      }

      .form-group {
          margin-bottom: 1.5rem;
      }

      .form-group label {
          display: block;
          margin-bottom: 0.5rem;
          color: #333;
          font-weight: 500;
      }

      .form-group input {
          width: 100%;
          padding: 0.75rem;
          border: 2px solid #e1e5e9;
          border-radius: 6px;
          font-size: 1rem;
          transition: border-color 0.3s ease;
          box-sizing: border-box;
      }

      .form-group input:focus {
          outline: none;
          border-color: #667eea;
      }

      .login-btn {
          width: 100%;
          padding: 0.75rem;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
          border: none;
          border-radius: 6px;
          font-size: 1rem;
          font-weight: 600;
          cursor: pointer;
          transition: transform 0.2s ease;
      }

      .login-btn:hover {
          transform: translateY(-2px);
      }

      .error-message {
          background: #fee;
          color: #c33;
          padding: 0.75rem;
          border-radius: 6px;
          margin-bottom: 1rem;
          border-left: 4px solid #c33;
      }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <h1>Welcome</h1>
    <p>Sign in to continue</p>
  </div>

  <div th:if="${error}" class="error-message" th:text="${error}"></div>

  <form method="post" th:action="@{${action_url}}" autocomplete="on">
    <input type="hidden" name="redirect_uri" th:value="${redirect_uri}">
    <input type="hidden" name="client_id" th:value="${client_id}">

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Username" autocomplete="username" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password"
             required>
    </div>

    <button type="submit" class="login-btn">Sign In</button>
  </form>
</div>
</body>
</html>
