global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - auth-service:9000

  - job_name: discovery-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - discovery-service:9761

  - job_name: event-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - event-service:9001

  - job_name: ticket-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - ticket-service:9002

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - order-service:9003

  - job_name: salechannel-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - salechannel-service:9004

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:9999

  - job_name: bff-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - bff-service:9010

# notification-service is not a Spring Boot Actuator target today.
# Add a dedicated exporter before scraping it here.